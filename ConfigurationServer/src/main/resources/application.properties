
server.port=8085
spring.application.name=ConfigurationServer
spring.datasource.url=jdbc:mysql://localhost:3306/configserver
spring.datasource.username=root
spring.datasource.password=chetan123
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true

#Disabling git for doing config server with jpa
spring.cloud.config.server.git.enabled=false

# Point to your GitHub Repo
spring.cloud.config.server.git.uri=https://github.com/ChetanChandrol/config-repo
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true


# Security Credentials
spring.security.user.name=configUser
spring.security.user.password=SuperSecretPassword123!