spring.application.name=ECommerceProductService
spring.datasource.url=jdbc:mysql://localhost:3306/ecomproductservice
spring.datasource.username=root
spring.datasource.password=chetan123
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Fake Store API Configuration
fakestore.api.url="https://fakestoreapi.com";
fakestore.api.path.product="/product";
fakestore.api.path.category="/category";

#OAuth2.0 config
server.port=8081
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://localhost:8443


server.ssl.enabled=true
server.ssl.key-store=classpath:productService.p12
server.ssl.key-store-password=productservice
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=productservice
